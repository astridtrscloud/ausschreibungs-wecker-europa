version: "3.8"

services:
  app:
    build: .
    container_name: ausschreibungs-wecker-europa
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.moonshot.ai/v1}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-kimi-latest}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - MAIL_TO=${MAIL_TO}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-changeme}
      - SCRAPE_INTERVAL_MINUTES=${SCRAPE_INTERVAL_MINUTES:-30}
      - DATABASE_URL=sqlite:///./data/ausschreibungen.db
      - TED_COUNTRIES=${TED_COUNTRIES}
      - SIMAP_ENABLED=${SIMAP_ENABLED:-true}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
